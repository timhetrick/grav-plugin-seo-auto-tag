form:
  fields:
    tabs:
      fields:
        seo_auto_tag:
          title: PLUGIN_SEO_AUTO_TAG.TAB
          type: tab
          fields:
            header.seo.title:
              type: text
              label: PLUGIN_SEO_AUTO_TAG.FIELDS.TITLE_OVERRIDE_LABEL
              help: PLUGIN_SEO_AUTO_TAG.FIELDS.TITLE_OVERRIDE_HELP
              
            header.seo.description:
              type: textarea
              label: PLUGIN_SEO_AUTO_TAG.FIELDS.DESC_OVERRIDE_LABEL
              help: PLUGIN_SEO_AUTO_TAG.FIELDS.DESC_OVERRIDE_HELP
              validate:
                max: 160

            header.seo.image:
              type: filepicker
              folder: '@self'
              label: PLUGIN_SEO_AUTO_TAG.FIELDS.IMAGE_OVERRIDE_LABEL
              help: PLUGIN_SEO_AUTO_TAG.FIELDS.IMAGE_OVERRIDE_HELP
              preview_images: true
              accept:
                - image/*

            header.seo.robots:
              type: select
              label: PLUGIN_SEO_AUTO_TAG.FIELDS.ROBOTS_LABEL
              help: PLUGIN_SEO_AUTO_TAG.FIELDS.ROBOTS_HELP
              default: ''
              options:
                '': PLUGIN_SEO_AUTO_TAG.FIELDS.ROBOTS_DEFAULT
                'noindex': PLUGIN_SEO_AUTO_TAG.FIELDS.ROBOTS_NOINDEX
                'nofollow': PLUGIN_SEO_AUTO_TAG.FIELDS.ROBOTS_NOFOLLOW
                'noindex, nofollow': PLUGIN_SEO_AUTO_TAG.FIELDS.ROBOTS_NOINDEX_NOFOLLOW
